<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth or Dare: Global Chat Match</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@600;700;800&display=swap');

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0d0507;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
        }

        h1,
        h2,
        h3,
        .font-syne {
            font-family: 'Syne', sans-serif;
        }

        .bg-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 77, 109, 0.3);
            border-radius: 10px;
        }

        /* Pulsing animation for recording */
        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .recording-pulse {
            animation: pulse-red 1.5s infinite;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ec4899;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Firebase Initialization -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseLib = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Data Banks ---
        const TRUTH_BANK = [
            "What's the most embarrassing song on your playlist?",
            "What is the weirdest thing you have ever eaten?",
            "What is the worst lie you ever told?",
            "Have you ever had feelings for someone in this room?",
            "What is your biggest regret in life so far?",
            "What is the craziest thing you have done on a dare?",
            "What is your biggest guilty pleasure?"
        ];

        const DARE_BANK = [
            "Speak in an accent of the group's choosing for the next 3 turns.",
            "Do your best impression of another player.",
            "Do 10 push-ups right now. No breaks.",
            "Let the other player go through your camera roll for 60 seconds.",
            "Sing a love song dramatically for 30 seconds.",
            "Post an embarrassing selfie to your social media.",
            "Give the other player a genuine compliment."
        ];

        // --- SVGs ---
        const Icons = {
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" /></svg>,
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" x2="12" y1="19" y2="22" /></svg>,
            Camera: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" /><circle cx="12" cy="13" r="3" /></svg>,
            Type: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7" /><line x1="9" x2="15" y1="20" y2="20" /><line x1="12" x2="12" y1="4" y2="20" /></svg>,
            Stop: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" /></svg>
        };

        // --- Optimized Recorders for Network Sync ---
        const AudioRecorder = ({ onComplete, onCancel }) => {
            const [timeLeft, setTimeLeft] = useState(5); // 5s limit to prevent huge Firestore docs
            const [error, setError] = useState(null);
            const mediaRecorder = useRef(null);
            const audioChunks = useRef([]);
            const timerRef = useRef(null);

            useEffect(() => {
                startRecording();
                return () => {
                    if (mediaRecorder.current && mediaRecorder.current.state === 'recording') {
                        mediaRecorder.current.stop();
                    }
                    clearInterval(timerRef.current);
                };
            }, []);

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder.current = new MediaRecorder(stream);
                    audioChunks.current = [];

                    mediaRecorder.current.ondataavailable = (event) => audioChunks.current.push(event.data);
                    mediaRecorder.current.onstop = () => {
                        const audioBlob = new Blob(audioChunks.current, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => onComplete(reader.result); // Save as Base64 for Firestore
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.current.start();

                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                stopRecording();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);

                } catch (err) {
                    setError("Mic access denied or unavailable.");
                }
            };

            const stopRecording = () => {
                clearInterval(timerRef.current);
                if (mediaRecorder.current && mediaRecorder.current.state === 'recording') {
                    mediaRecorder.current.stop();
                }
            };

            if (error) {
                return (
                    <div className="text-center p-4">
                        <p className="text-red-400 text-sm mb-2">{error}</p>
                        <button onClick={onCancel} className="text-white/60 text-sm underline">Cancel</button>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center py-6">
                    <p className="text-sm text-white/60 mb-4 animate-pulse">Recording ({timeLeft}s left)...</p>
                    <button onClick={stopRecording} className="recording-pulse w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-white">
                        <Icons.Stop />
                    </button>
                </div>
            );
        };

        const CameraCapture = ({ onComplete, onCancel }) => {
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                startCamera();
                return () => stopCamera();
            }, []);

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    streamRef.current = stream;
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (err) {
                    setError("Camera access denied or unavailable.");
                }
            };

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                }
            };

            const takePhoto = () => {
                if (!videoRef.current) return;
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                // Compress image to fit in Firestore safely
                const MAX_WIDTH = 250;
                const scale = MAX_WIDTH / videoRef.current.videoWidth;
                canvas.width = MAX_WIDTH;
                canvas.height = videoRef.current.videoHeight * scale;

                ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
                const imageUrl = canvas.toDataURL('image/jpeg', 0.6); // 60% quality jpeg

                stopCamera();
                onComplete(imageUrl);
            };

            if (error) {
                return (
                    <div className="text-center p-4">
                        <p className="text-red-400 text-sm mb-2">{error}</p>
                        <button onClick={onCancel} className="text-white/60 text-sm underline">Cancel</button>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center py-2 relative">
                    <div className="relative w-full max-w-sm rounded-xl overflow-hidden bg-black aspect-[3/4]">
                        <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover"></video>
                        <div className="absolute bottom-4 left-0 w-full flex justify-center gap-4">
                            <button onClick={onCancel} className="w-12 h-12 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-white text-xs">Back</button>
                            <button onClick={takePhoto} className="w-12 h-12 bg-white rounded-full border-4 border-white/50 flex items-center justify-center"></button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Chat Bubble UI ---
        const ChatBubble = ({ message, players, meId }) => {
            if (message.sender === 'system') {
                return (
                    <div className="flex justify-center my-4">
                        <span className="text-xs font-medium bg-white/10 px-4 py-1.5 rounded-full text-white/70">
                            {message.content}
                        </span>
                    </div>
                );
            }

            const isMe = message.sender === meId;
            const isQuestion = message.type === 'question';
            const alignment = isMe ? 'justify-end' : 'justify-start';
            const bubbleColor = isMe
                ? 'bg-gradient-to-br from-pink-600 to-rose-600 rounded-br-none'
                : 'bg-white/10 rounded-bl-none';

            return (
                <div className={`flex w-full mb-4 ${alignment} animate-in fade-in slide-in-from-bottom-2`}>
                    <div className={`max-w-[80%] flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                        <span className="text-[10px] text-white/50 mb-1 mx-1 font-semibold uppercase tracking-wider">
                            {players[message.sender] || "Player"}
                        </span>
                        <div className={`p-4 rounded-2xl ${bubbleColor} shadow-lg`}>
                            {isQuestion && (
                                <span className="text-[10px] uppercase tracking-wider font-bold opacity-70 block mb-1">
                                    {message.qType}
                                </span>
                            )}
                            {message.contentType === 'text' && <p className="text-sm md:text-base whitespace-pre-wrap">{message.content}</p>}
                            {message.contentType === 'audio' && <audio controls src={message.content} className="max-w-[200px] h-10 rounded" />}
                            {message.contentType === 'image' && <img src={message.content} alt="Photo Proof" className="max-w-full rounded-lg border border-white/20" />}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Game Room Component (Synced to Network) ---
        const GameRoom = ({ user, gameCode, gameData, fb }) => {
            const [customText, setCustomText] = useState('');
            const chatEndRef = useRef(null);

            const meId = user.uid;
            const pOrder = gameData.playerOrder || [];
            const players = gameData.players || {};
            const opponentId = pOrder.find(id => id !== meId);

            const isLobbyFull = pOrder.length === 2;
            const turnIndex = gameData.turnIndex || 0;
            const step = gameData.step || 'CHOOSE_TYPE';

            const askerId = pOrder[turnIndex];
            const answererId = pOrder[(turnIndex + 1) % 2];

            // Determine active player based on the step
            let activePlayerId;
            if (['CHOOSE_TYPE', 'CHOOSE_QUESTION'].includes(step)) activePlayerId = askerId;
            else activePlayerId = answererId;

            const isMyTurn = activePlayerId === meId;

            // Auto-scroll chat
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [gameData.chat]);

            const updateGame = async (updates) => {
                const docRef = fb.doc(fb.db, 'truth_or_dare_games', gameCode);
                try {
                    await fb.updateDoc(docRef, updates);
                } catch (err) {
                    console.error("Sync error:", err);
                }
            };

            const addMessage = (content, type = 'text', qType = null, contentType = 'text') => {
                const newMessage = {
                    id: Date.now() + Math.random().toString(),
                    sender: meId,
                    content,
                    type,
                    qType,
                    contentType
                };

                // Keep chat history relatively short to prevent breaching 1MB limit with base64 data
                let newChat = [...(gameData.chat || []), newMessage];
                if (newChat.length > 30) newChat = newChat.slice(newChat.length - 30);

                return newChat;
            };

            // Actions
            const handleTypeSelect = (type) => updateGame({ selectedType: type, step: 'CHOOSE_QUESTION' });

            const handleAskQuestion = (questionText) => {
                const newChat = addMessage(questionText, 'question', gameData.selectedType, 'text');
                updateGame({ chat: newChat, step: 'CHOOSE_ANSWER_METHOD' });
                setCustomText('');
            };

            const handleMethodSelect = (method) => updateGame({ answerMethod: method, step: 'PROVIDING_ANSWER' });

            const handleAnswerComplete = (content, contentType = 'text') => {
                const newChat = addMessage(content, 'answer', null, contentType);
                updateGame({
                    chat: newChat,
                    step: 'CHOOSE_TYPE',
                    turnIndex: (turnIndex + 1) % 2,
                    answerMethod: ''
                });
                setCustomText('');
            };

            if (!isLobbyFull) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen px-6 bg-gradient-to-br from-[#0d0507] via-[#1a0b12] to-[#0d0507]">
                        <div className="w-full max-w-md bg-glass p-8 rounded-3xl shadow-2xl text-center space-y-6 animate-in fade-in zoom-in">
                            <h2 className="font-syne text-2xl font-bold">Waiting for Player 2...</h2>
                            <p className="text-white/60 text-sm">Give your friend this code to join your room:</p>
                            <div className="bg-black/50 border border-white/10 rounded-2xl py-6 tracking-[0.5em] text-4xl font-mono text-pink-400">
                                {gameCode}
                            </div>
                            <div className="flex justify-center"><div className="loader"></div></div>
                        </div>
                    </div>
                );
            }

            // Input Area
            const renderInputArea = () => {
                if (!isMyTurn) {
                    return (
                        <div className="flex flex-col items-center justify-center py-6 text-center animate-pulse">
                            <div className="loader mb-3 border-t-indigo-500 w-5 h-5"></div>
                            <p className="text-white/50 text-xs tracking-widest uppercase">Waiting for {players[activePlayerId]}...</p>
                        </div>
                    );
                }

                if (step === 'CHOOSE_TYPE') {
                    return (
                        <div className="space-y-3 animate-in fade-in slide-in-from-bottom-4">
                            <p className="text-center text-xs text-pink-400 uppercase tracking-widest font-bold">Your turn to Ask!</p>
                            <div className="flex gap-3">
                                <button onClick={() => handleTypeSelect('Truth')} className="flex-1 bg-indigo-500/20 border border-indigo-500/50 hover:bg-indigo-500/30 text-indigo-300 font-syne font-bold py-4 rounded-xl transition-all">
                                    💬 Ask Truth
                                </button>
                                <button onClick={() => handleTypeSelect('Dare')} className="flex-1 bg-rose-500/20 border border-rose-500/50 hover:bg-rose-500/30 text-rose-300 font-syne font-bold py-4 rounded-xl transition-all">
                                    ⚡ Ask Dare
                                </button>
                            </div>
                        </div>
                    );
                }

                if (step === 'CHOOSE_QUESTION') {
                    const bank = gameData.selectedType === 'Truth' ? TRUTH_BANK : DARE_BANK;
                    return (
                        <div className="space-y-3 animate-in fade-in slide-in-from-right-4">
                            <div className="flex justify-between items-center px-1">
                                <p className="text-xs text-white/50 uppercase tracking-widest">Pick a {gameData.selectedType}</p>
                                <button onClick={() => updateGame({ step: 'CHOOSE_TYPE' })} className="text-xs text-white/40 hover:text-white">Back</button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-2 snap-x">
                                {bank.map((q, i) => (
                                    <button key={i} onClick={() => handleAskQuestion(q)} className="snap-center shrink-0 w-48 bg-white/5 hover:bg-white/10 text-left text-sm p-3 rounded-xl border border-white/10 transition-colors">
                                        "{q}"
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-2 items-center bg-black/40 p-1 rounded-2xl border border-white/10 focus-within:border-pink-500/50 transition-colors">
                                <input
                                    type="text" value={customText} onChange={e => setCustomText(e.target.value)}
                                    placeholder="Or type a custom one..."
                                    className="flex-1 bg-transparent border-none outline-none px-4 py-2 text-sm text-white placeholder-white/30"
                                    onKeyDown={e => e.key === 'Enter' && customText.trim() && handleAskQuestion(customText.trim())}
                                />
                                <button onClick={() => customText.trim() && handleAskQuestion(customText.trim())} disabled={!customText.trim()} className="bg-pink-600 hover:bg-pink-500 disabled:opacity-50 text-white p-2.5 rounded-xl transition-colors">
                                    <Icons.Send />
                                </button>
                            </div>
                        </div>
                    );
                }

                if (step === 'CHOOSE_ANSWER_METHOD') {
                    return (
                        <div className="space-y-3 animate-in fade-in slide-in-from-bottom-4">
                            <p className="text-center text-xs text-indigo-400 uppercase tracking-widest font-bold">Your turn to Answer!</p>
                            <div className="grid grid-cols-3 gap-2">
                                <button onClick={() => handleMethodSelect('text')} className="flex flex-col items-center justify-center gap-2 bg-white/5 hover:bg-white/10 py-4 rounded-xl border border-white/10 transition-all text-white/80">
                                    <Icons.Type /><span className="text-xs font-semibold">Type</span>
                                </button>
                                <button onClick={() => handleMethodSelect('audio')} className="flex flex-col items-center justify-center gap-2 bg-white/5 hover:bg-white/10 py-4 rounded-xl border border-white/10 transition-all text-white/80">
                                    <Icons.Mic /><span className="text-xs font-semibold">Voice (5s)</span>
                                </button>
                                <button onClick={() => handleMethodSelect('camera')} className="flex flex-col items-center justify-center gap-2 bg-white/5 hover:bg-white/10 py-4 rounded-xl border border-white/10 transition-all text-white/80">
                                    <Icons.Camera /><span className="text-xs font-semibold">Photo</span>
                                </button>
                            </div>
                        </div>
                    );
                }

                if (step === 'PROVIDING_ANSWER') {
                    if (gameData.answerMethod === 'text') {
                        return (
                            <div className="space-y-2 animate-in fade-in slide-in-from-right-4">
                                <div className="flex justify-between items-center px-1">
                                    <p className="text-xs text-white/50 uppercase tracking-widest">Answering via Text</p>
                                    <button onClick={() => updateGame({ step: 'CHOOSE_ANSWER_METHOD' })} className="text-xs text-white/40 hover:text-white">Back</button>
                                </div>
                                <div className="flex gap-2 items-end bg-black/40 p-1 rounded-2xl border border-white/10 focus-within:border-pink-500/50">
                                    <textarea
                                        autoFocus value={customText} onChange={e => setCustomText(e.target.value)}
                                        placeholder="Type your answer..."
                                        className="flex-1 bg-transparent border-none outline-none px-4 py-3 text-sm text-white placeholder-white/30 resize-none h-[80px]"
                                    />
                                    <button onClick={() => customText.trim() && handleAnswerComplete(customText.trim(), 'text')} disabled={!customText.trim()} className="bg-pink-600 hover:bg-pink-500 disabled:opacity-50 text-white p-3 rounded-xl transition-colors mb-1 mr-1">
                                        <Icons.Send />
                                    </button>
                                </div>
                            </div>
                        );
                    }
                    if (gameData.answerMethod === 'audio') return <div className="animate-in fade-in slide-in-from-right-4 bg-white/5 rounded-2xl border border-white/10 p-2"><AudioRecorder onComplete={(url) => handleAnswerComplete(url, 'audio')} onCancel={() => updateGame({ step: 'CHOOSE_ANSWER_METHOD' })} /></div>;
                    if (gameData.answerMethod === 'camera') return <div className="animate-in fade-in slide-in-from-right-4 bg-white/5 rounded-2xl border border-white/10 p-2"><CameraCapture onComplete={(url) => handleAnswerComplete(url, 'image')} onCancel={() => updateGame({ step: 'CHOOSE_ANSWER_METHOD' })} /></div>;
                }
            };

            return (
                <div className="flex flex-col h-screen w-full max-w-2xl mx-auto bg-[#0d0507] shadow-2xl relative">
                    {/* Header */}
                    <header className="flex-shrink-0 bg-glass px-6 py-4 flex justify-between items-center z-20 border-b-0 rounded-b-3xl">
                        <div className="flex flex-col">
                            <span className="font-syne font-bold text-xl text-white">Truth / Dare</span>
                            <span className="text-[10px] uppercase tracking-widest text-pink-400">
                                Room: {gameCode} • {players[meId]} vs {players[opponentId]}
                            </span>
                        </div>
                        <div className="bg-white/10 rounded-full px-3 py-1 flex items-center gap-2">
                            <span className={`w-2 h-2 rounded-full ${isMyTurn ? 'bg-pink-500 animate-pulse' : 'bg-white/30'}`}></span>
                            <span className="text-xs font-medium text-white/80">{isMyTurn ? "Your Turn" : "Waiting..."}</span>
                        </div>
                    </header>

                    {/* Chat History */}
                    <main className="flex-1 overflow-y-auto px-4 py-6 chat-container z-10 flex flex-col relative">
                        {(gameData.chat || []).map(msg => (
                            <ChatBubble key={msg.id} message={msg} players={players} meId={meId} />
                        ))}
                        <div ref={chatEndRef} className="pb-4" />

                        {/* Background Decoration */}
                        <div className="fixed top-1/4 left-1/2 -translate-x-1/2 w-64 h-64 bg-pink-500/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
                        <div className="fixed bottom-1/4 left-1/4 w-64 h-64 bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
                    </main>

                    {/* Input Area */}
                    <footer className="flex-shrink-0 bg-glass p-4 sm:p-6 z-20 border-t-0 rounded-t-3xl">
                        {renderInputArea()}
                    </footer>
                </div>
            );
        };


        // --- App Component (Handles Auth & Lobby) ---
        const App = () => {
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const [gameCode, setGameCode] = useState(null);
            const [gameData, setGameData] = useState(null);

            const [playerName, setPlayerName] = useState('');
            const [joinCodeInput, setJoinCodeInput] = useState('');
            const [loading, setLoading] = useState("Connecting to network...");
            const [error, setError] = useState('');

            // Initialize Firebase
            useEffect(() => {
                const init = async () => {
                    let attempts = 0;
                    while (!window.FirebaseLib && attempts < 20) {
                        await new Promise(r => setTimeout(r, 100));
                        attempts++;
                    }
                    if (!window.FirebaseLib) {
                        setLoading(null);
                        return setError("Failed to load networking library.");
                    }

                    const fbLib = window.FirebaseLib;

                    // =========================================================================
                    // USER'S PROVIDED FIREBASE CONFIG
                    // =========================================================================
                    const config = {
                        apiKey: "AIzaSyBfMXn3fTb-vKkl0kE3v5hwIhohv2LMVac",
                        authDomain: "teedee-94589.firebaseapp.com",
                        projectId: "teedee-94589",
                        storageBucket: "teedee-94589.firebasestorage.app",
                        messagingSenderId: "463895487776",
                        appId: "1:463895487776:web:9574f06f81ce326de6e345",
                        measurementId: "G-D9JHBFVDRM"
                    };
                    // =========================================================================

                    const app = fbLib.initializeApp(config);
                    const auth = fbLib.getAuth(app);
                    const db = fbLib.getFirestore(app);

                    setFb({ app, auth, db, ...fbLib });

                    try {
                        await fbLib.signInAnonymously(auth);
                    } catch (e) {
                        setLoading(null);
                        return setError("Authentication failed. Ensure Anonymous sign-in is enabled in Firebase.");
                    }

                    fbLib.onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setLoading(null);
                    });
                };
                init();
            }, []);

            // Subscribe to Game Updates
            useEffect(() => {
                if (!fb || !user || !gameCode) return;
                const docRef = fb.doc(fb.db, 'truth_or_dare_games', gameCode);

                const unsubscribe = fb.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) setGameData(docSnap.data());
                    else setError("Game was closed or not found.");
                }, (err) => {
                    setError("Lost connection to game.");
                });
                return () => unsubscribe();
            }, [fb, user, gameCode]);

            const handleCreateGame = async (e) => {
                e.preventDefault();
                if (!playerName.trim() || !fb || !user) return;

                setLoading("Creating room...");
                const code = Math.random().toString(36).substring(2, 7).toUpperCase();
                const docRef = fb.doc(fb.db, 'truth_or_dare_games', code);

                try {
                    await fb.setDoc(docRef, {
                        players: { [user.uid]: playerName.trim() },
                        playerOrder: [user.uid],
                        turnIndex: 0,
                        step: 'CHOOSE_TYPE',
                        chat: [{ id: 'sys-start', sender: 'system', content: `Room created by ${playerName.trim()}` }]
                    });
                    setGameCode(code);
                    setLoading(null);
                } catch (err) {
                    setError("Failed to create room. Ensure Firestore Security Rules are set to test mode.");
                    setLoading(null);
                }
            };

            const handleJoinGame = async (e) => {
                e.preventDefault();
                if (!playerName.trim() || !joinCodeInput.trim() || !fb || !user) return;

                setLoading("Joining room...");
                const code = joinCodeInput.trim().toUpperCase();
                const docRef = fb.doc(fb.db, 'truth_or_dare_games', code);

                try {
                    const docSnap = await fb.getDoc(docRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.playerOrder.includes(user.uid)) {
                            setGameCode(code); // Rejoin
                        } else if (data.playerOrder.length === 1) {
                            // Join as Player 2
                            await fb.updateDoc(docRef, {
                                [`players.${user.uid}`]: playerName.trim(),
                                playerOrder: [...data.playerOrder, user.uid],
                                chat: [...data.chat, { id: 'sys-join', sender: 'system', content: `${playerName.trim()} has joined!` }]
                            });
                            setGameCode(code);
                        } else {
                            setError("Room is full.");
                        }
                    } else {
                        setError("Invalid Game Code.");
                    }
                } catch (err) {
                    setError("Failed to join room.");
                }
                setLoading(null);
            };

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-[#0d0507]">
                    <div className="flex flex-col items-center">
                        <div className="loader mb-4"></div>
                        <p className="text-white/60">{loading}</p>
                    </div>
                </div>
            );

            if (gameCode && gameData) {
                return <GameRoom user={user} gameCode={gameCode} gameData={gameData} fb={fb} />;
            }

            return (
                <div className="flex flex-col items-center justify-center h-screen px-6 bg-gradient-to-br from-[#0d0507] via-[#1a0b12] to-[#0d0507]">
                    <div className="w-full max-w-md bg-glass p-8 rounded-3xl shadow-2xl relative overflow-hidden">
                        <h1 className="font-syne text-5xl font-black text-center mb-2 bg-gradient-to-r from-pink-500 to-indigo-400 bg-clip-text text-transparent">T or D</h1>
                        <p className="text-center text-white/50 mb-8 uppercase tracking-widest text-xs">Global Chat Edition</p>

                        {error && (
                            <div className="bg-red-500/20 border border-red-500/50 text-red-200 p-3 rounded-xl text-sm mb-6 text-center animate-in fade-in">
                                {error}
                                <button onClick={() => setError('')} className="ml-2 underline opacity-70 font-bold hover:text-white">Dismiss</button>
                            </div>
                        )}

                        <div className="space-y-6 relative z-10">
                            <div>
                                <label className="block text-xs font-semibold text-white/70 mb-1 ml-2">Your Display Name</label>
                                <input
                                    className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-pink-500 transition-colors"
                                    placeholder="e.g. Alex"
                                    value={playerName}
                                    onChange={e => setPlayerName(e.target.value)}
                                />
                            </div>

                            <div className="border-t border-white/10 pt-6 mt-4">
                                <button
                                    onClick={handleCreateGame}
                                    disabled={!playerName.trim()}
                                    className="w-full bg-gradient-to-r from-pink-600 to-rose-500 hover:from-pink-500 hover:to-rose-400 disabled:opacity-50 text-white font-bold py-3.5 rounded-xl transition-all"
                                >
                                    Host New Game
                                </button>
                            </div>

                            <div className="relative flex items-center py-2">
                                <div className="flex-grow border-t border-white/10"></div>
                                <span className="flex-shrink-0 mx-4 text-white/30 text-xs font-medium">OR</span>
                                <div className="flex-grow border-t border-white/10"></div>
                            </div>

                            <form onSubmit={handleJoinGame} className="flex gap-2">
                                <input
                                    className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-indigo-500 transition-colors font-mono uppercase"
                                    placeholder="GAME CODE"
                                    maxLength="5"
                                    value={joinCodeInput}
                                    onChange={e => setJoinCodeInput(e.target.value)}
                                />
                                <button
                                    type="submit"
                                    disabled={!playerName.trim() || joinCodeInput.trim().length !== 5}
                                    className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 px-6 rounded-xl font-bold text-white transition-colors"
                                >
                                    Join
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
